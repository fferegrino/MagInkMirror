<?xml version="1.0" encoding="UTF-8"?>
<svg width="160px" height="160px" viewBox="0 0 160 160" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>dusk</title>
    <defs>
        <linearGradient x1="50%" y1="0%" x2="50%" y2="100%" id="linearGradient-1">
            <stop stop-color="{{ top_color }}" offset="0%"></stop>
            <stop stop-color="{{ bottom_color }}" offset="100%"></stop>
        </linearGradient>
    </defs>
    <g id="dusk" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect id="background" fill="url(#linearGradient-1)" x="0" y="0" width="160" height="160"></rect>
    </g>
</svg>